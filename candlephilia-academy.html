<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Candlephilia Candle Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C8860A;--accent:#F5C842;--dark:#1A0F00;--cream:#FDF6E3;
  --muted:#8B6914;--text:#2C1A00;--softgold:#E8A825;--deep:#3D1F00;
  --card:#FFFBF0;--border:#E2C97E;
}
body{font-family:'Cormorant Garamond',Georgia,serif;background:var(--cream);min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.fade-up{animation:fadeUp 0.6s ease forwards}
.fade-in{animation:fadeIn 0.4s ease forwards}

/* ── SIGN IN ── */
#signin-screen{
  min-height:100vh;
  background:radial-gradient(ellipse at 55% 0%,#3D1F00 0%,#1A0F00 55%,#0D0700 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.signin-box{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:36px}
.flames{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.logo-title{font-family:'Cinzel',serif;font-size:26px;font-weight:600;color:var(--accent);letter-spacing:0.18em;text-transform:uppercase}
.logo-sub{color:#C8A96A;font-size:12px;letter-spacing:0.28em;text-transform:uppercase;margin-top:6px}
.glass-card{
  background:rgba(253,246,227,0.05);border:1px solid rgba(200,134,10,0.28);
  border-radius:20px;padding:32px 28px;
  box-shadow:0 32px 64px rgba(0,0,0,0.5),inset 0 1px 0 rgba(245,200,66,0.1);
}
.card-title{color:var(--cream);font-size:19px;font-weight:600;margin-bottom:6px}
.card-sub{color:#C8A96A;font-size:13px;margin-bottom:24px;line-height:1.65}
.field-label{color:var(--muted);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;display:block;margin-bottom:7px}
.field-input{
  width:100%;padding:11px 13px;border-radius:10px;
  border:1px solid rgba(200,134,10,0.35);background:rgba(26,15,0,0.55);
  color:var(--cream);font-size:14px;font-family:inherit;outline:none;
}
.field-input::placeholder{color:rgba(200,169,106,0.5)}
.field-input.error{border-color:#FC8181}
.error-msg{color:#FC8181;font-size:13px;margin:6px 0 14px}
.mb-20{margin-bottom:20px}
.primary-btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,var(--gold),var(--softgold));
  color:var(--dark);font-size:15px;font-weight:700;cursor:pointer;
  font-family:inherit;letter-spacing:0.05em;
  box-shadow:0 4px 18px rgba(200,134,10,0.35);transition:all 0.2s;
}
.primary-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,134,10,0.45)}
.ghost-btn{
  width:100%;padding:11px;border-radius:10px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit;
  transition:all 0.2s;
}
.ghost-btn:hover{background:rgba(200,134,10,0.08)}
.admin-link{
  margin-top:20px;padding-top:18px;border-top:1px solid rgba(200,134,10,0.15);
  display:flex;justify-content:center;
}
.admin-link button{background:transparent;border:none;color:#5A3D00;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:0.1em}
.demo-hint{color:#4A2E00;font-size:12px;text-align:center;margin-top:16px}

/* ── HEADER ── */
#portal-header{
  background:var(--dark);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.35);
}
.header-brand{display:flex;align-items:center;gap:10px}
.header-name{color:var(--accent);font-family:'Cinzel',serif;font-size:14px;letter-spacing:0.14em}
.header-sub{color:#8B6914;font-size:10px;letter-spacing:0.18em;text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px}
.header-student-name{color:var(--cream);font-size:13px;font-weight:600}
.header-days{color:#8B6914;font-size:11px}
.signout-btn{padding:6px 14px;border-radius:8px;border:1px solid rgba(200,134,10,0.3);background:transparent;color:#C8A96A;font-size:12px;cursor:pointer;font-family:inherit}

/* ── PORTAL BODY ── */
#portal-body{max-width:720px;margin:0 auto;padding:20px 14px}

/* ── WELCOME BANNER ── */
.welcome-banner{
  background:linear-gradient(135deg,var(--dark) 0%,var(--deep) 100%);
  border-radius:16px;padding:22px 24px;margin-bottom:22px;
  box-shadow:0 8px 32px rgba(26,15,0,0.2);position:relative;overflow:hidden;
}
.welcome-banner::before{content:"🕯️";position:absolute;right:-8px;top:-8px;opacity:0.06;font-size:110px;line-height:1}
.welcome-label{color:var(--accent);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:4px}
.welcome-name{color:var(--cream);font-size:21px;font-weight:700;margin-bottom:6px}
.attendance-dots{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px}
.att-dot{display:flex;flex-direction:column;align-items:center;gap:2px}
.att-dot span{color:#8B6914;font-size:10px}
.progress-bar{background:#E8D5A0;border-radius:99px;height:8px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:99px;transition:width 1s ease}

/* ── DAY NAV ── */
.day-nav{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none}
.day-nav::-webkit-scrollbar{display:none}
.day-btn{
  padding:9px 16px;border-radius:99px;white-space:nowrap;
  font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:all 0.18s;flex-shrink:0;
}
.day-btn.active{border:2px solid var(--gold);background:var(--gold);color:var(--dark)}
.day-btn.unlocked{border:2px solid var(--border);background:transparent;color:var(--muted)}
.day-btn.locked{border:2px solid rgba(139,105,20,0.3);background:rgba(26,15,0,0.04);color:rgba(139,105,20,0.4);cursor:not-allowed;opacity:0.55}

/* ── TABS ── */
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{
  padding:10px 15px;border:none;font-family:inherit;white-space:nowrap;
  border-bottom:3px solid transparent;background:transparent;
  color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;
  margin-bottom:-2px;transition:all 0.15s;
}
.tab-btn.active{color:var(--gold);font-weight:700;border-bottom-color:var(--gold)}

/* ── DAY HEADER ── */
.day-header{margin-bottom:18px}
.day-title{color:var(--text);font-size:18px;font-family:'Cinzel',serif;letter-spacing:0.08em;margin-bottom:4px}
.att-status{color:var(--muted);font-size:13px}

/* ── TOPIC CARDS ── */
.topic-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px 20px;display:flex;align-items:center;gap:14px;
  box-shadow:0 2px 8px rgba(200,134,10,0.06);margin-bottom:10px;
}
.topic-num{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--accent));
  display:flex;align-items:center;justify-content:center;
  color:var(--dark);font-size:13px;font-weight:700;
}
.topic-text{color:var(--text);font-size:15px;font-weight:600;line-height:1.4}

/* ── ESSENTIALS ── */
.essential-card{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:10px;
}
.essential-icon{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,#FFF3CC,#F5E8A0);
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.essential-text{color:var(--text);font-size:14px;font-weight:500}

/* ── ASSIGNMENT ── */
.assignment-card{
  background:linear-gradient(135deg,#FFF9ED,#FFF3CC);
  border:2px solid var(--accent);border-radius:16px;padding:26px;
  position:relative;overflow:hidden;
}
.assignment-card::before{content:"📝";position:absolute;top:14px;right:18px;font-size:44px;opacity:0.1}
.assignment-label{color:var(--gold);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;font-weight:700;margin-bottom:10px}
.assignment-text{color:var(--text);font-size:15px;line-height:1.85;white-space:pre-line;font-style:italic}
.assignment-due{padding-top:14px;border-top:1px solid #E8D5A0;color:var(--muted);font-size:12px;letter-spacing:0.1em;margin-top:16px}
.no-assignment{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;text-align:center}
.no-assignment-icon{font-size:48px;margin-bottom:10px}
.no-assignment-text{color:var(--muted);font-size:15px}

/* ── FEEDBACK ── */
.feedback-success{background:#F0FFF4;border:2px solid #68D391;border-radius:16px;padding:32px;text-align:center}
.feedback-success-icon{font-size:48px;margin-bottom:10px}
.feedback-success-title{color:#276749;margin-bottom:8px;font-family:'Cinzel',serif}
.feedback-success-text{color:#2F855A;font-size:14px}
.feedback-form{display:flex;flex-direction:column;gap:18px}
.select-input{
  width:100%;padding:11px 13px;border-radius:10px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text);font-size:14px;font-family:inherit;outline:none;
}
.textarea-input{
  width:100%;padding:11px 13px;border-radius:10px;
  border:1px solid var(--border);background:var(--card);
  color:var(--text);font-size:14px;font-family:inherit;outline:none;
  resize:vertical;line-height:1.65;
}
.emoji-row{display:flex;gap:8px}
.emoji-btn{
  width:46px;height:46px;border-radius:12px;
  border:2px solid var(--border);background:var(--card);
  font-size:22px;cursor:pointer;transition:all 0.15s;
}
.emoji-btn.selected{border-color:var(--gold);background:#FFF3CC;transform:scale(1.18)}

/* ── LEADERBOARD ── */
.leaderboard-intro{color:var(--muted);font-size:13px;margin-bottom:20px}
.leader-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:16px 20px;
  display:flex;align-items:center;gap:16px;margin-bottom:10px;
  transition:all 0.2s;
}
.leader-card.me{
  background:linear-gradient(135deg,#FFF9ED,#FFF3CC);
  border:2px solid var(--gold);
  box-shadow:0 4px 20px rgba(200,134,10,0.18);
}
.leader-rank{font-size:26px;font-weight:700;color:var(--gold);min-width:36px;text-align:center;font-family:'Cinzel',serif}
.leader-rank.small{font-size:18px}
.leader-info{flex:1}
.leader-name{color:var(--text);font-weight:700;font-size:15px}
.leader-me-tag{color:var(--gold);font-size:12px;margin-left:6px}
.leader-days{color:var(--muted);font-size:12px;margin-top:2px}
.leader-bar-bg{background:#E8D5A0;border-radius:99px;height:6px;margin-top:8px;overflow:hidden}
.leader-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));border-radius:99px;transition:width 1s ease}
.leader-score{text-align:right}
.leader-points{color:var(--gold);font-weight:700;font-size:20px;font-family:'Cinzel',serif}
.leader-pts-label{color:var(--muted);font-size:11px}
.leaderboard-note{color:#C8A96A;font-size:12px;text-align:center;margin-top:20px;font-style:italic}

/* ── ADMIN ── */
#admin-screen{
  min-height:100vh;
  background:radial-gradient(ellipse at 55% 0%,#1A0F00 0%,#0D0700 100%);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
#admin-portal{min-height:100vh;background:linear-gradient(160deg,#FDF6E3 0%,#F5E8C0 100%)}
.admin-header{
  background:var(--dark);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,0.35);flex-wrap:wrap;gap:10px;
}
.admin-nav{display:flex;gap:8px;flex-wrap:wrap}
.admin-nav-btn{
  padding:6px 14px;border-radius:8px;font-family:inherit;
  font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;
  text-transform:capitalize;
}
.admin-nav-btn.active{border:1px solid var(--gold);background:var(--gold);color:var(--dark)}
.admin-nav-btn.inactive{border:1px solid rgba(200,134,10,0.3);background:transparent;color:#C8A96A}
.admin-body{max-width:800px;margin:0 auto;padding:24px 16px}
.section-title{color:var(--text);font-family:'Cinzel',serif;margin-top:0;letter-spacing:0.1em;margin-bottom:16px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:10px;color:var(--accent);font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.1em;text-align:center;border-bottom:1px solid rgba(200,134,10,0.2);background:var(--dark)}
th.left{text-align:left}
td{padding:10px 8px;text-align:center}
td.name-cell{padding:10px 14px;color:var(--text);font-weight:600;font-size:13px;white-space:nowrap;text-align:left}
tr.even{background:var(--card)}
tr.odd{background:#FFF5D6}
.score-input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:#FFFBF0;color:var(--text);font-size:15px;font-family:inherit;outline:none}
.score-label{color:var(--muted);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;display:block;margin-bottom:4px}
.score-gold{color:var(--gold)}
.student-reg-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:24px}
.student-list-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.student-name{color:var(--text);font-weight:700;font-size:14px}
.student-email{color:var(--muted);font-size:12px;margin-top:2px}
.student-days{color:var(--gold);font-weight:700;font-size:13px}
.day-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.day-score-btn{padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.2s}
.day-score-btn.active{border:2px solid var(--gold);background:var(--gold);color:var(--dark)}
.day-score-btn.inactive{border:2px solid var(--border);background:transparent;color:var(--muted)}
.score-student-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:16px}
.score-student-name{font-weight:700;color:var(--text);font-size:15px;margin-bottom:14px}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.feedback-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px}
.feedback-header{display:flex;justify-content:space-between;margin-bottom:6px}
.feedback-student{color:var(--gold);font-weight:700;font-size:14px}
.feedback-meta{color:var(--muted);font-size:12px}
.feedback-content{color:var(--text);font-size:13px;line-height:1.6}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--dark);color:var(--accent);padding:12px 28px;border-radius:99px;
  font-size:14px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,0.5);
  border:1px solid rgba(200,134,10,0.4);z-index:9999;white-space:nowrap;
  transition:transform 0.3s ease;pointer-events:none;
}
#toast.show{transform:translateX(-50%) translateY(0)}

.hidden{display:none!important}
.mt-10{margin-top:10px}
.mt-20{margin-top:20px}
.overflow-x{overflow-x:auto}
</style>
</head>
<body>

<!-- ══ SIGN IN ══ -->
<div id="signin-screen">
  <div class="signin-box fade-up">
    <div class="logo-area">
      <div class="flames">
        <svg width="32" height="32" viewBox="0 0 24 24"><path d="M12 2C12 2 6 8 6 13a6 6 0 0012 0c0-5-6-11-6-11z" fill="#F5C842" opacity="0.9"/><path d="M12 8C12 8 9 12 9 14.5a3 3 0 006 0C15 12 12 8 12 8z" fill="#C8860A" opacity="0.8"/></svg>
        <svg width="44" height="44" viewBox="0 0 24 24"><path d="M12 2C12 2 6 8 6 13a6 6 0 0012 0c0-5-6-11-6-11z" fill="#F5C842" opacity="0.9"/><path d="M12 8C12 8 9 12 9 14.5a3 3 0 006 0C15 12 12 8 12 8z" fill="#C8860A" opacity="0.8"/></svg>
        <svg width="32" height="32" viewBox="0 0 24 24"><path d="M12 2C12 2 6 8 6 13a6 6 0 0012 0c0-5-6-11-6-11z" fill="#F5C842" opacity="0.9"/><path d="M12 8C12 8 9 12 9 14.5a3 3 0 006 0C15 12 12 8 12 8z" fill="#C8860A" opacity="0.8"/></svg>
      </div>
      <div class="logo-title">Candlephilia</div>
      <div class="logo-sub">Candle Academy · Batch C · 2026</div>
    </div>
    <div class="glass-card">
      <div class="card-title">Student Sign In</div>
      <div class="card-sub">Enter your registered email to access today's class and mark your attendance.</div>
      <label class="field-label">Your Email Address</label>
      <input type="email" id="signin-email" class="field-input mb-20" placeholder="yourname@email.com" onkeydown="if(event.key==='Enter')doSignIn()"/>
      <div id="signin-error" class="error-msg hidden"></div>
      <button class="primary-btn" onclick="doSignIn()">Sign In & Mark Attendance</button>
      <div class="admin-link">
        <button onclick="showScreen('admin-screen')">🔐 Instructor Access</button>
      </div>
    </div>
    <div class="demo-hint">Enter your registered email to sign in</div>
  </div>
</div>

<!-- ══ STUDENT PORTAL ══ -->
<div id="portal-screen" class="hidden">
  <div id="portal-header">
    <div class="header-brand">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2C12 2 6 8 6 13a6 6 0 0012 0c0-5-6-11-6-11z" fill="#F5C842" opacity="0.9"/><path d="M12 8C12 8 9 12 9 14.5a3 3 0 006 0C15 12 12 8 12 8z" fill="#C8860A" opacity="0.8"/></svg>
      <div>
        <div class="header-name">CANDLEPHILIA</div>
        <div class="header-sub">Candle Academy · Batch C</div>
      </div>
    </div>
    <div class="header-right">
      <div>
        <div class="header-student-name" id="header-name"></div>
        <div class="header-days" id="header-days"></div>
      </div>
      <button class="signout-btn" onclick="doSignOut()">Sign Out</button>
    </div>
  </div>

  <div id="portal-body">
    <!-- Welcome Banner -->
    <div class="welcome-banner fade-up">
      <div class="welcome-label">Welcome back</div>
      <div class="welcome-name" id="welcome-name"></div>
      <div class="attendance-dots" id="att-dots"></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div style="color:#8B6914;font-size:12px;margin-top:6px" id="progress-text"></div>
    </div>

    <!-- Day Nav -->
    <div class="day-nav" id="day-nav"></div>

    <!-- Day Content -->
    <div id="day-content" class="fade-in">
      <div class="day-header">
        <div class="day-title" id="day-title"></div>
        <div class="att-status" id="att-status"></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('topics',this)">📚 Topics</button>
        <button class="tab-btn" onclick="switchTab('essentials',this)">🧴 Essentials</button>
        <button class="tab-btn" onclick="switchTab('assignment',this)">📝 Assignment</button>
        <button class="tab-btn" onclick="switchTab('feedback',this)">💬 Feedback</button>
        <button class="tab-btn" onclick="switchTab('leaderboard',this)">🏆 Leaderboard</button>
      </div>

      <!-- Topics -->
      <div id="tab-topics" class="fade-in"></div>
      <!-- Essentials -->
      <div id="tab-essentials" class="hidden fade-in"></div>
      <!-- Assignment -->
      <div id="tab-assignment" class="hidden fade-in"></div>
      <!-- Feedback -->
      <div id="tab-feedback" class="hidden fade-in"></div>
      <!-- Leaderboard -->
      <div id="tab-leaderboard" class="hidden fade-in"></div>
    </div>
  </div>
</div>

<!-- ══ ADMIN LOGIN ══ -->
<div id="admin-screen" class="hidden">
  <div class="signin-box fade-up">
    <div class="logo-area">
      <svg width="40" height="40" viewBox="0 0 24 24"><path d="M12 2C12 2 6 8 6 13a6 6 0 0012 0c0-5-6-11-6-11z" fill="#F5C842" opacity="0.9"/><path d="M12 8C12 8 9 12 9 14.5a3 3 0 006 0C15 12 12 8 12 8z" fill="#C8860A" opacity="0.8"/></svg>
      <div class="logo-title" style="margin-top:10px">INSTRUCTOR PANEL</div>
      <div class="logo-sub">Candlephilia Academy</div>
    </div>
    <div class="glass-card">
      <label class="field-label">Admin Password</label>
      <input type="password" id="admin-pw" class="field-input mb-20" placeholder="Enter password" onkeydown="if(event.key==='Enter')doAdminLogin()"/>
      <div id="admin-pw-error" class="error-msg hidden"></div>
      <button class="primary-btn" onclick="doAdminLogin()">Enter</button>
      <button class="ghost-btn mt-10" onclick="showScreen('signin-screen')">← Back to Student Login</button>

</div>

<div id="admin-portal" class="hidden">
  <div class="admin-header">
    <div class="header-brand">
      <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 2C12 2 6 8 6 13a6 6 0 0012 0c0-5-6-11-6-11z" fill="#F5C842" opacity="0.9"/><path d="M12 8C12 8 9 12 9 14.5a3 3 0 006 0C15 12 12 8 12 8z" fill="#C8860A" opacity="0.8"/></svg>
      <div>
        <div class="header-name">CANDLEPHILIA</div>
        <div class="header-sub">Instructor Panel</div>
      </div>
    </div>
    <div class="admin-nav">
      <button class="admin-nav-btn active" id="anav-dashboard" onclick="switchAdminTab('dashboard')">Dashboard</button>
      <button class="admin-nav-btn inactive" id="anav-scoring" onclick="switchAdminTab('scoring')">Scoring</button>
      <button class="admin-nav-btn inactive" id="anav-register" onclick="switchAdminTab('register')">Register</button>
      <button class="admin-nav-btn inactive" onclick="doAdminSignOut()">Sign Out</button>
    </div>
  </div>
  <div class="admin-body">
    <div id="atab-dashboard"></div>
    <div id="atab-scoring" class="hidden"></div>
    <div id="atab-register" class="hidden"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────
const SCHEDULE = [
  {day:1,date:"2026-06-15",label:"June 15"},
  {day:2,date:"2026-06-16",label:"June 16"},
  {day:3,date:"2026-06-17",label:"June 17"},
  {day:4,date:"2026-06-18",label:"June 18"},
  {day:5,date:"2026-06-19",label:"June 19"},
  {day:6,date:"2026-06-22",label:"June 22"},
  {day:7,date:"2026-06-23",label:"June 23"},
  {day:8,date:"2026-06-24",label:"June 24"},
  {day:9,date:"2026-06-25",label:"June 25"},
  {day:10,date:"2026-06-26",label:"June 26"},
];

const CURRICULUM = {
  1:{topics:["What is home fragrance?","Physical examples of the types we will be learning about","What is scent?","Types and classes of scents","What is a scent frequency and how can you tell?"],essentials:["Notebook & pen","Curiosity & open mind"],assignment:"1. List out 5 scents each that fall under each scent note.\n2. List out 5 more examples each on each class of scent listed above.\n\nSubmit to instructor's DM."},
  2:{topics:["Difference between fragrance oil and essential oil","When best to use each","Difference between volume and weight — when best to use each","SI units and how to measure each","How to blend fragrances to create your own unique scent"],essentials:["Notebook & pen","Calculator","Measuring tools if available"],assignment:null},
  3:{topics:["What is a candle and its components","Types of candles","Types of candle vessels","Types of candle wicks and their effects","Types of candle waxes and their effects"],essentials:["Notebook & pen","Apron","Safety gloves"],assignment:"Replicate the wax exercise for:\n1. Soft Soy Wax\n2. Hard Soy Wax\n3. Beeswax\n4. Coconut Wax\n5. Jelly Wax\n\nMaintain temperatures in °F. This is essential for the next class!"},
  4:{topics:["Double, triple wicking, wick boosting and why","Wax blending and why","Tools needed for candle making","How to determine & calculate amount of wax needed for your vessel","How to determine & calculate amount of fragrance oil needed for your vessel"],essentials:["Notebook & pen","Calculator","Measuring scale"],assignment:null},
  5:{topics:["How to make scented candles","How to make sculptured candles","How to make wax melts","How to make tea light candles","How to make dessert candles"],essentials:["Apron","Gloves","Eye protection","Closed-toe shoes","Pouring jug"],assignment:"List 10 possible flaws in candle making:\nFor each: Professional name, meaning, cause, solution/prevention."},
  6:{topics:["How to conduct a burn test","Things to look out for in a burn test","How to improve cold throw","How to improve hot throw","How to calculate total burn time for your candle"],essentials:["Candle samples","Timer","Notebook & pen"],assignment:null},
  7:{topics:["Possible candle flaws and how to fix them","Room size to candle portioning","Things a standard candle label should include","Mechanism of scent dispersion in candles","All candle-related questions (open Q&A)"],essentials:["Notebook & pen","All previous notes"],assignment:"5 advantages & 5 disadvantages of each wax type in candle making only."},
  8:{topics:["What are linen sprays?","Various methods of making them","Instructor's easiest & best recipe for linen sprays","Adding colour if you must","How to test its strength"],essentials:["Spray bottles","Measuring tools","Notebook & pen"],assignment:null},
  9:{topics:["What is a reed diffuser?","Methods of making reed diffusers","Instructor's own recipe for reed diffusers","How it works and what differentiates it from a car diffuser","How to test the strength of your diffuser"],essentials:["Reed sticks","Diffuser vessels","Notebook & pen"],assignment:"Different types of diffusers & how they function.\nHome fragrance brands you like & why you like them."},
  10:{topics:["Importance of product testing","Power of content creation & storytelling","Essentials for great pricing","Packaging insight","Understanding your target audience & marketing"],essentials:["Notebook & pen","Phone (for content examples)"],assignment:"Share your overall training experience — leave a review on Google Maps for Candlephilia."},
};

const ADMIN_PASSWORD = "candlephilia2026";
const CRITERIA = ["Participation","Assignment","Engagement","Punctuality"];

// ── STATE ─────────────────────────────────────────────────────────────
// GOOGLE SHEETS API
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxa7Ms6tEqc0OgK0zWA1GOQdGwlDRHSTVpemtN0LP0phW2fgAa9z0HGcHELeIrdHsMu/exec";
async function sheetAPI(params){
  try{
    const url=SHEET_URL+"?"+new URLSearchParams(params).toString();
    const res=await fetch(url);
    return await res.json();
  }catch(e){console.error("Sheet API error:",e);return null;}
}

let students = [];
let attendance = {};
let scores = {};
let feedbackData = {};
let currentStudent = null;
let activeDay = null;
let scoringDay = 1;
let feedbackSent = {};
let selectedRating = 0;

async function loadStudents(){
  const data = await sheetAPI({action:"getStudents"});
  if(data && data.students && data.students.length > 0){
    students = data.students;
  }
}
window.addEventListener("load", ()=>{ loadStudents(); });

// ── HELPERS ───────────────────────────────────────────────────────────
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function isUnlocked(dateStr){return todayStr()>=dateStr}
function medal(r){return r===1?"🥇":r===2?"🥈":r===3?"🥉":"#"+r}
function totalScore(email){
  let t=0;
  SCHEDULE.forEach(s=>CRITERIA.forEach(c=>{const v=scores?.[email]?.[s.day]?.[c];if(v!==undefined&&v!=="")t+=Number(v);}));
  return t;
}
function maxScore(){return CRITERIA.length*SCHEDULE.length*10}
function daysAttended(email){return Object.keys(attendance[email]||{}).length}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}
function showScreen(id){
  ["signin-screen","portal-screen","admin-screen","admin-portal"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
}

// ── SIGN IN ───────────────────────────────────────────────────────────
async function doSignIn(){
  const email=document.getElementById("signin-email").value.trim().toLowerCase();
  const errEl=document.getElementById("signin-error");
  const inEl=document.getElementById("signin-email");
  showToast("Verifying...");
  await loadStudents();
  const found=students.find(s=>s.email.toLowerCase()===email);
  if(!found){
    errEl.textContent="Email not registered. Please contact your instructor.";
    errEl.classList.remove("hidden");inEl.classList.add("error");return;
  }
  errEl.classList.add("hidden");inEl.classList.remove("error");
  currentStudent=found;
  // Mark attendance
  const today=todayStr();
  const dayEntry=SCHEDULE.find(s=>s.date===today);
  if(dayEntry&&!attendance[found.email]?.[dayEntry.day]){
    if(!attendance[found.email])attendance[found.email]={};
    const now=new Date().toLocaleTimeString("en-NG",{hour:"2-digit",minute:"2-digit"});
    attendance[found.email][dayEntry.day]=now;
    sheetAPI({action:"markAttendance",email:found.email,name:found.name,day:dayEntry.day,time:now});
    setTimeout(()=>showToast(`✅ Attendance marked — Day ${dayEntry.day}`),500);
  }
  // Find first unlocked day
  const first=SCHEDULE.find(s=>isUnlocked(s.date));
  activeDay=first?first.day:1;
  renderPortal();
  showScreen("portal-screen");
}
function doSignOut(){
  currentStudent=null;activeDay=null;feedbackSent={};selectedRating=0;
  document.getElementById("signin-email").value="";
  showScreen("signin-screen");
}

// ── PORTAL RENDER ─────────────────────────────────────────────────────
function renderPortal(){
  if(!currentStudent)return;
  const days=daysAttended(currentStudent.email);
  const total=SCHEDULE.length;
  document.getElementById("header-name").textContent=currentStudent.name;
  document.getElementById("header-days").textContent=`${days}/${total} days`;
  document.getElementById("welcome-name").textContent=currentStudent.name+" 🔥";
  document.getElementById("progress-fill").style.width=`${Math.round(days/total*100)}%`;
  document.getElementById("progress-text").textContent=`${days} of ${total} classes attended`;

  // Attendance dots
  const dots=document.getElementById("att-dots");
  dots.innerHTML=SCHEDULE.map(s=>{
    const checked=attendance[currentStudent.email]?.[s.day];
    const unlocked=isUnlocked(s.date);
    return `<div class="att-dot"><span>${!unlocked?"🔒":checked?"✅":"⬜"}</span><span>D${s.day}</span></div>`;
  }).join("");

  // Day nav
  const nav=document.getElementById("day-nav");
  nav.innerHTML=SCHEDULE.map(s=>{
    const unlocked=isUnlocked(s.date);
    const cls=activeDay===s.day?"active":unlocked?"unlocked":"locked";
    return `<button class="day-btn ${cls}" onclick="selectDay(${s.day})">${unlocked?"":"🔒 "}Day ${s.day}</button>`;
  }).join("");

  renderDayContent();
}

function selectDay(day){
  const s=SCHEDULE.find(x=>x.day===day);
  if(!isUnlocked(s.date)){showToast(`Day ${day} unlocks on ${s.label}`);return;}
  activeDay=day;selectedRating=0;
  renderPortal();
  switchTab("topics",document.querySelector(".tab-btn"));
}

function renderDayContent(){
  if(!activeDay)return;
  const s=SCHEDULE.find(x=>x.day===activeDay);
  const c=CURRICULUM[activeDay];
  document.getElementById("day-title").textContent=`Day ${activeDay} — ${s.label}`;
  const att=attendance[currentStudent.email]?.[activeDay];
  document.getElementById("att-status").textContent=att
    ?`✅ Attendance marked at ${att}`
    :todayStr()===s.date?"⏳ Sign in again to mark today's attendance":"📅 Not yet attended";

  // Topics
  document.getElementById("tab-topics").innerHTML=c.topics.map((t,i)=>`
    <div class="topic-card">
      <div class="topic-num">${i+1}</div>
      <div class="topic-text">${t}</div>
    </div>`).join("");

  // Essentials
  document.getElementById("tab-essentials").innerHTML=`
    <p style="color:var(--muted);font-size:14px;margin-bottom:18px">Come prepared with these items for Day ${activeDay}.</p>`+
    c.essentials.map(item=>`
    <div class="essential-card">
      <div class="essential-icon">🕯️</div>
      <div class="essential-text">${item}</div>
    </div>`).join("");

  // Assignment
  document.getElementById("tab-assignment").innerHTML=c.assignment?`
    <div class="assignment-card">
      <div class="assignment-label">Your Task</div>
      <div class="assignment-text">${c.assignment}</div>
      <div class="assignment-due">📅 Due before the start of the next class</div>
    </div>`:`
    <div class="no-assignment">
      <div class="no-assignment-icon">✨</div>
      <div class="no-assignment-text">No assignment for Day ${activeDay}. Focus on today's class!</div>
    </div>`;

  // Feedback
  renderFeedbackTab();

  // Leaderboard
  renderLeaderboard();
}

function renderFeedbackTab(){
  const c=CURRICULUM[activeDay];
  if(feedbackSent[activeDay]){
    document.getElementById("tab-feedback").innerHTML=`
      <div class="feedback-success">
        <div class="feedback-success-icon">✅</div>
        <h3 class="feedback-success-title">Feedback Received!</h3>
        <p class="feedback-success-text">Your instructor will review this before the next class.</p>
        <button class="ghost-btn mt-20" style="max-width:200px;margin:20px auto 0" onclick="feedbackSent[activeDay]=false;renderFeedbackTab()">Submit Another</button>
      </div>`;
    return;
  }
  const topicOptions=c.topics.map(t=>`<option value="${t}">${t}</option>`).join("")+`<option value="General">General comment</option>`;
  const emojis=["😕","😐","🙂","😊","🤩"];
  document.getElementById("tab-feedback").innerHTML=`
    <div class="feedback-form">
      <div>
        <label class="field-label">Which topic are you referring to?</label>
        <select id="fb-topic" class="select-input"><option value="">— Select a topic —</option>${topicOptions}</select>
      </div>
      <div>
        <label class="field-label">What would you like more clarity on?</label>
        <textarea id="fb-note" class="textarea-input" rows="5" placeholder="Describe what was unclear or what you'd like explained further..."></textarea>
      </div>
      <div>
        <label class="field-label">How was today's class overall?</label>
        <div class="emoji-row">
          ${emojis.map((em,i)=>`<button class="emoji-btn" id="emoji-${i+1}" onclick="selectEmoji(${i+1})">${em}</button>`).join("")}
        </div>
      </div>
      <button class="primary-btn" onclick="submitFeedback()">Submit Feedback</button>
    </div>`;
}

function selectEmoji(r){
  selectedRating=r;
  for(let i=1;i<=5;i++){
    const btn=document.getElementById(`emoji-${i}`);
    if(btn)btn.className=`emoji-btn${i===r?" selected":""}`;
  }
}

function submitFeedback(){
  const topic=document.getElementById("fb-topic").value;
  const note=document.getElementById("fb-note").value;
  if(!topic||!note){showToast("Please fill in all fields.");return;}
  const key=`${currentStudent.email}-${activeDay}-${Date.now()}`;
  feedbackData[key]={studentName:currentStudent.name,email:currentStudent.email,day:activeDay,topic,note,rating:selectedRating};
  sheetAPI({action:"saveFeedback",email:currentStudent.email,name:currentStudent.name,day:activeDay,topic,note,rating:selectedRating});
  feedbackSent[activeDay]=true;selectedRating=0;
  renderFeedbackTab();showToast("💬 Feedback sent!");
}

function renderLeaderboard(){
  const lb=students.map(s=>({
    ...s,total:totalScore(s.email),
    daysIn:daysAttended(s.email),
    pct:maxScore()>0?Math.round(totalScore(s.email)/maxScore()*100):0,
  })).sort((a,b)=>b.total-a.total);

  document.getElementById("tab-leaderboard").innerHTML=`
    <h3 style="color:var(--text);margin-top:0;margin-bottom:6px;font-family:'Cinzel',serif;letter-spacing:0.1em;font-size:17px">🏆 Batch C Leaderboard</h3>
    <p class="leaderboard-intro">Scores are based on participation, assignments, engagement & punctuality.</p>`+
    lb.map((s,i)=>{
      const isMe=s.email===currentStudent?.email;
      const r=i+1;
      return `<div class="leader-card${isMe?" me":""}">
        <div class="leader-rank${r>3?" small":""}">${medal(r)}</div>
        <div class="leader-info">
          <div class="leader-name">${s.name}${isMe?'<span class="leader-me-tag">(You)</span>':""}</div>
          <div class="leader-days">${s.daysIn} classes attended</div>
          <div class="leader-bar-bg"><div class="leader-bar-fill" style="width:${s.pct}%"></div></div>
        </div>
        <div class="leader-score">
          <div class="leader-points">${s.total}</div>
          <div class="leader-pts-label">points</div>
        </div>
      </div>`;
    }).join("")+
    `<p class="leaderboard-note">Scores are updated by your instructor after each class. Keep showing up! 🔥</p>`;
}

function switchTab(name,btn){
  ["topics","essentials","assignment","feedback","leaderboard"].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.add("hidden");
  });
  document.getElementById(`tab-${name}`).classList.remove("hidden");
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  else document.querySelector(".tab-btn").classList.add("active");
}

// ── ADMIN ─────────────────────────────────────────────────────────────
function doAdminLogin(){
  const pw=document.getElementById("admin-pw").value;
  const errEl=document.getElementById("admin-pw-error");
  if(pw!==ADMIN_PASSWORD){errEl.textContent="Incorrect password.";errEl.classList.remove("hidden");return;}
  errEl.classList.add("hidden");
  renderAdminDashboard();renderAdminScoring();renderAdminRegister();
  showScreen("admin-portal");
}
function doAdminSignOut(){
  document.getElementById("admin-pw").value="";
  showScreen("signin-screen");
}
function switchAdminTab(name){
  ["dashboard","scoring","register"].forEach(t=>{
    document.getElementById(`atab-${t}`).classList.add("hidden");
    document.getElementById(`anav-${t}`).className="admin-nav-btn inactive";
  });
  document.getElementById(`atab-${name}`).classList.remove("hidden");
  document.getElementById(`anav-${name}`).className="admin-nav-btn active";
  if(name==="scoring")renderAdminScoring();
  if(name==="register")renderAdminRegister();
  if(name==="dashboard")renderAdminDashboard();
}

function renderAdminDashboard(){
  const today=todayStr();
  let html=`<h2 class="section-title">Attendance Overview</h2>
  <div class="overflow-x"><table>
    <thead><tr><th class="left">Student</th>${SCHEDULE.map(s=>`<th>D${s.day}</th>`).join("")}<th>Total</th></tr></thead>
    <tbody>${students.map((st,i)=>`
      <tr class="${i%2===0?"even":"odd"}">
        <td class="name-cell">${st.name}</td>
        ${SCHEDULE.map(s=>`<td style="font-size:16px">${attendance[st.email]?.[s.day]?"✅":isUnlocked(s.date)?"❌":"🔒"}</td>`).join("")}
        <td style="color:var(--gold);font-weight:700">${daysAttended(st.email)}/${SCHEDULE.length}</td>
      </tr>`).join("")}
    </tbody>
  </table></div>
  <h2 class="section-title" style="margin-top:32px">Student Feedback</h2>`;
  const fkeys=Object.keys(feedbackData);
  if(fkeys.length===0){html+=`<p style="color:var(--muted);font-size:14px">No feedback submitted yet.</p>`;}
  else{html+=fkeys.map(k=>{const fb=feedbackData[k];return `
    <div class="feedback-card">
      <div class="feedback-header">
        <span class="feedback-student">${fb.studentName}</span>
        <span class="feedback-meta">Day ${fb.day} · ${fb.topic}</span>
      </div>
      <p class="feedback-content">${fb.note}</p>
      <div style="margin-top:6px;font-size:18px">${["😕","😐","🙂","😊","🤩"][fb.rating-1]||"—"}</div>
    </div>`;}).join("");}
  document.getElementById("atab-dashboard").innerHTML=html;
}

function renderAdminScoring(){
  let html=`<h2 class="section-title">Score Students</h2>
  <div class="day-selector">${SCHEDULE.map(s=>`
    <button class="day-score-btn ${scoringDay===s.day?"active":"inactive"}" onclick="setScoringDay(${s.day})" ${!isUnlocked(s.date)?"style='opacity:0.4'":""}>Day ${s.day}</button>`).join("")}
  </div>
  <div id="scoring-cards">${renderScoringCards()}</div>
  <button class="primary-btn" style="margin-top:24px" onclick="saveScores()">Save All Scores</button>`;
  document.getElementById("atab-scoring").innerHTML=html;
}
function renderScoringCards(){
  return students.map(st=>`
    <div class="score-student-card">
      <div class="score-student-name">${st.name}</div>
      <div class="score-grid">${CRITERIA.map(c=>`
        <div>
          <label class="score-label">${c} <span class="score-gold">/10</span></label>
          <input type="number" min="0" max="10" class="score-input"
            id="score-${st.email}-${scoringDay}-${c}"
            value="${scores[st.email]?.[scoringDay]?.[c]??""}"
            placeholder="0–10"/>
        </div>`).join("")}
      </div>
    </div>`).join("");
}
function setScoringDay(day){
  scoringDay=day;
  renderAdminScoring();
}
function saveScores(){
  students.forEach(st=>{
    CRITERIA.forEach(c=>{
      const el=document.getElementById(`score-${st.email}-${scoringDay}-${c}`);
      if(el){
        if(!scores[st.email])scores[st.email]={};
        if(!scores[st.email][scoringDay])scores[st.email][scoringDay]={};
        scores[st.email][scoringDay][c]=el.value;
      }
    });
  });
  showToast("✅ Scores saved!");
  if(currentStudent)renderLeaderboard();
}

function renderAdminRegister(){
  let html=`<h2 class="section-title">Registered Students</h2>

  <!-- NEW BATCH BUTTON -->
  <div style="background:linear-gradient(135deg,#1A0F00,#3D1F00);border-radius:14px;padding:20px;margin-bottom:24px;border:1px solid rgba(200,134,10,0.3)">
    <div style="color:var(--accent);font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin-bottom:6px">🔄 Start New Batch</div>
    <p style="color:#C8A96A;font-size:13px;margin:0 0 14px;line-height:1.6">This will clear ALL attendance, scores, and feedback. Student list stays until you delete manually. Use this at the start of every new batch.</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <input id="new-batch-name" placeholder="Batch name e.g. Batch D" style="flex:1;padding:10px 13px;border-radius:8px;border:1px solid rgba(200,134,10,0.4);background:rgba(26,15,0,0.6);color:var(--cream);font-size:14px;font-family:inherit;outline:none;min-width:160px"/>
      <button onclick="startNewBatch()" style="padding:10px 20px;border-radius:8px;border:none;background:var(--gold);color:var(--dark);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">Start New Batch</button>
    </div>
  </div>

  <!-- ADD STUDENT -->
  <div class="student-reg-card">
    <h3 style="color:var(--text);margin:0 0 16px;font-size:16px">Add New Student</h3>
    <label class="field-label">Full Name</label>
    <input id="new-name" class="field-input mb-20" placeholder="Student Full Name" style="background:#FFFBF0;color:var(--text);border:1px solid var(--border)"/>
    <label class="field-label">Email Address</label>
    <input id="new-email" type="email" class="field-input" placeholder="student@email.com" style="background:#FFFBF0;color:var(--text);border:1px solid var(--border);margin-bottom:16px"/>
    <button class="primary-btn" onclick="registerStudent()">Register Student</button>
  </div>

  <!-- STUDENT LIST -->
  <h3 style="color:var(--text);font-size:15px;margin:0 0 12px;font-family:'Cinzel',serif">${students.length} Registered Students</h3>
  ${students.map((s,i)=>`
    <div class="student-list-card">
      <div><div class="student-name">${s.name}</div><div class="student-email">${s.email}</div></div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="student-days">${daysAttended(s.email)}/${SCHEDULE.length} days</div>
        <button onclick="deleteStudent('${s.email}')" style="padding:6px 12px;border-radius:8px;border:1px solid #FC8181;background:transparent;color:#FC8181;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600">Remove</button>
      </div>
    </div>`).join("")}`;
  document.getElementById("atab-register").innerHTML=html;
}

function registerStudent(){
  const name=document.getElementById("new-name").value.trim();
  const email=document.getElementById("new-email").value.trim().toLowerCase();
  if(!name||!email){showToast("Fill in both fields.");return;}
  if(students.find(s=>s.email===email)){showToast("Email already registered.");return;}
  students.push({name,email});
  showToast("✅ Student registered!");
  renderAdminRegister();
}

async function deleteStudent(email){
  if(!confirm(`Remove this student? This cannot be undone.`))return;
  showToast("Removing...");
  await sheetAPI({action:"removeStudent",email});
  students=students.filter(s=>s.email!==email);
  delete attendance[email];
  delete scores[email];
  showToast("🗑️ Student removed.");
  renderAdminRegister();
  renderAdminDashboard();
}

function startNewBatch(){
  const batchName=document.getElementById("new-batch-name").value.trim();
  if(!batchName){showToast("Please enter a batch name first.");return;}
  if(!confirm(`Start "${batchName}"? This will clear ALL attendance, scores and feedback. Student list will remain.`))return;
  // Clear all data
  attendance={};
  scores={};
  feedbackData={};
  feedbackSent={};
  // Update batch name in header
  document.querySelectorAll(".header-sub").forEach(el=>{
    if(el.textContent.includes("Candle Academy"))el.textContent=`Candle Academy · ${batchName}`;
  });
  document.querySelectorAll(".logo-sub").forEach(el=>{
    if(el.textContent.includes("Candle Academy"))el.textContent=`Candle Academy · ${batchName} · 2026`;
  });
  showToast(`🔥 ${batchName} started! All records cleared.`);
  renderAdminRegister();
  renderAdminDashboard();
}
</script>
</body>
</html>
